<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coloring App</title>
    <style>
        html, body {
            
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* overflow: hidden; */
            height: 100%;
            user-select: none;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: all 0.4s ease;
        }

        .title {
            height: 80px;
            min-height: 80px;
            max-height: 80px;
            flex-shrink: 0;
            padding: 5px;
            font-size: 60px;
            text-align: center;
            background: linear-gradient(135deg, #ff6ec4, #7873f5, #4ade80, #facc15, #f87171);
        }

        .controls {
            flex-shrink: 0;
            overflow-y: auto;
            padding: 5px;
            background: rgba(221, 221, 221, 0.9);
        }

        .control-wrapper {
            display: flex;
            flex: 1;
            justify-content: space-evenly;
            width: 100%;
            margin: 5px 0;
        }
        /* Mobile styles... */
        #canvasWrapper,
        .side-panel {
            width: 100%;
        }

        #canvasWrapper {
            display: flex;
            flex: 1;
            position: relative;
            justify-content: center;   /* horizontal centering */
            align-items: flex-start;   /* default to top alignment */
            height: 100vh;
        }

        canvas {
            /* flex: 1;
            display: block;
            top: 0;
            left: 0;
            width: 100%; */
            /* height: 100%; */
            /* touch-action: none; */
            max-width: 100%;
            max-height: 100%;
        }

        #bgCanvas, #paintCanvas, #cursorCanvas {
            position: absolute;
            top: 0;
            height: 100%;
            width: 100%;
        }

        /* Landscape & Desktop */
        @media (min-width: 600px) and (orientation: landscape),
            (min-width: 1200px) {
            .app {
                flex-direction: row-reverse; /* switch to side-by-side */
            }

            #canvasWrapper,
            .side-panel {
                width: 50%;
                flex-shrink: 0;
            }

            .control-wrapper {
                position: relative;
                width: 100%;
                flex-direction: column;
                justify-content: center;
            }

            .controls-container {
                width: 100%;
            }

            #canvasWrapper {
                position: relative;
                flex-shrink: 0;
                align-items: flex-start;
            }

            .side-panel {
                display: flex;
                flex-direction: column;
                width: 50%;
            }

            .title {
                height: 80px;
                min-height: 80px;
                max-height: 80px;
                flex-shrink: 0;
                width: 100%;
            }

            .controls {
                justify-items: center;
                flex: 1; /* fill remaining height */
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="side-panel">
            <div class="title">Coloring App</div>
            <div class="controls">
                <div class="controls-container">
                    <div class="control-wrapper">
                        <label>Color: <input type="color" id="colorPicker" value="#ff0000"></label>
                        <label>Brush Size: <input type="range" id="brushSize" min="1" max="40" value="10"></label>
                    </div>
                    <div class="control-wrapper">
                        <label>Zoom: <input type="range" id="zoomControl" min="0.8" max="2" step="0.1" value="1"></label>
                        <label><input type="checkbox" id="eraserToggle"> Eraser</label>
                        <button id="undoButton">Undo</button>
                    </div>
                    <div class="control-wrapper">
                        <button id="exportButton">Export</button>
                        <input type="file" id="imageLoader" accept="image/*">
                    </div>
                </div>
                
            </div>
        </div>
        <div id="canvasWrapper">
            <canvas id="bgCanvas"></canvas>
            <canvas id="paintCanvas"></canvas>
            <canvas id="cursorCanvas"></canvas>
        </div>
    </div>

        let imgLoaded = false;

        const img = new Image();
        img.onload = () => {
        imgLoaded = true;
        drawScaledImage(img);
        };
        img.src = base64Img;

        function drawScaledImage(img) {
        const bgCanvas = document.getElementById('bgCanvas');
        const bgCtx = bgCanvas.getContext('2d');

        // Update canvas to full window size
        // bgCanvas.width = window.innerWidth;
        // bgCanvas.height = window.innerHeight;

        // Get actual display size of canvas
        const cssWidth = bgCanvas.clientWidth;
        const cssHeight = bgCanvas.clientHeight;


        // Match canvas size to device window
        const dpr = window.devicePixelRatio || 1;
        // bgCanvas.width = window.innerWidth * dpr;
        // bgCanvas.height = window.innerHeight * dpr;
        // bgCanvas.style.width = window.innerWidth + "px";
        // bgCanvas.style.height = window.innerHeight + "px";

        // if based on 50% width
        bgCanvas.width = cssWidth * dpr;
        bgCanvas.height = cssHeight * dpr;
        bgCanvas.style.width = cssWidth + "px";
        bgCanvas.style.height = cssHeight + "px";
        bgCtx.setTransform(1, 0, 0, 1, 0, 0); // Reset any transforms
        bgCtx.scale(dpr, dpr); // Scale for sharp rendering

        // Calculate image scaling factor to fit within canvas bounds
        const scale = Math.min(
            window.innerWidth / img.width,
            window.innerHeight / img.height
        );

        const drawWidth = img.width * scale;
        const drawHeight = img.height * scale;

        // const x = (window.innerWidth - drawWidth) / 2;
        // const y = (window.innerHeight - drawHeight) / 2;

        const x = (cssWidth - drawWidth) / 2;
        const y = (cssHeight - drawHeight) / 2;

        // ######################################

        // Centered position
        // const x = (bgCanvas.width - img.width * scale) / 2;
        // const y = (bgCanvas.height - img.height * scale) / 2;

        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        // bgCtx.drawImage(img, x, y, img.width * scale, img.height * scale);
        bgCtx.drawImage(img, x, y, drawWidth, drawHeight);
        }

        window.addEventListener('resize', () => {
        if (img.complete) drawScaledImage(img);
        adjustLayoutForOrientation();
        });

        function adjustLayoutForOrientation() {
            const isPortrait = window.innerHeight > window.innerWidth;
            wrapper.style.alignItems = isPortrait ? 'flex-start' : 'center';
            
        }

        // window.addEventListener('resize', adjustLayoutForOrientation);
        window.addEventListener('orientationchange', adjustLayoutForOrientation);
        adjustLayoutForOrientation(); // Initial call
